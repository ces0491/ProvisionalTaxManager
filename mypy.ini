[mypy]
# Relaxed settings: third-party libraries (Flask, Werkzeug, Flask-WTF, etc.)
# don't all ship type stubs, and this is an application, not a typed library.
# Don't fail on unresolved/untyped imports.
ignore_missing_imports = True

# Keep type checking advisory rather than strict.
check_untyped_defs = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
warn_unused_ignores = False
